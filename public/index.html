<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Assistant</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1ea;
        --surface: #fffdf9;
        --surface-strong: #ffffff;
        --text: #171411;
        --muted: #6f675f;
        --line: #ddd3c7;
        --accent: #1f6f5f;
        --accent-soft: #e3f0ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at top, #ffffff 0, transparent 30%),
          linear-gradient(180deg, #efe7dc 0%, var(--bg) 45%, #f8f5ef 100%);
        color: var(--text);
      }

      main {
        width: min(100%, 32rem);
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .shell {
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: color-mix(in srgb, var(--surface) 88%, white);
        box-shadow: 0 18px 50px rgba(60, 44, 22, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.9rem, 8vw, 3rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .intro {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.5;
      }

      .status {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 16px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.92rem;
        font-weight: 600;
      }

      .field {
        margin-top: 18px;
      }

      .label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      select,
      textarea,
      button {
        width: 100%;
        font: inherit;
      }

      select,
      textarea {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface-strong);
        color: var(--text);
      }

      select {
        min-height: 3rem;
        padding: 0 14px;
      }

      .messages {
        list-style: none;
        padding: 0;
        margin: 18px 0 0;
        display: grid;
        gap: 10px;
      }

      .message {
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface-strong);
      }

      .message-role {
        display: block;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .message-text {
        display: block;
        margin-top: 8px;
        font-size: 0.96rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message-user {
        background: var(--accent-soft);
        border-color: transparent;
      }

      .composer {
        margin-top: 18px;
      }

      textarea {
        min-height: 7rem;
        padding: 14px;
        resize: vertical;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #f7faf8;
        font-weight: 700;
      }

      button:disabled {
        opacity: 0.6;
      }

      .empty {
        color: var(--muted);
        text-align: center;
      }

      @media (min-width: 640px) {
        main {
          padding-top: 48px;
        }

        .shell {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <p class="eyebrow">Ollama</p>
        <h1>Model chat</h1>
        <p class="intro">Pick a local model and send a message from one clean mobile screen.</p>
        <div class="status" data-status>Loading...</div>
        <div class="field">
          <label class="label" for="model-select">Model</label>
          <select id="model-select" data-model-select disabled>
            <option>Loading models...</option>
          </select>
        </div>
        <ul class="messages" data-message-list></ul>
        <form class="composer" data-chat-form>
          <label class="label" for="prompt">Message</label>
          <textarea
            id="prompt"
            name="prompt"
            data-prompt
            placeholder="Ask something..."
            required
          ></textarea>
          <div class="actions">
            <button type="submit" data-send-button>Send</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
