<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <section class="shell">
        <p class="eyebrow">Ollama</p>
        <h1>Model chat</h1>
        <p class="intro">Pick a local model and send a message from one clean mobile screen.</p>
        <div class="status" data-status>Loading...</div>
        <div class="field">
          <label class="label" for="model-select">Model</label>
          <select id="model-select" data-model-select disabled>
            <option>Loading models...</option>
          </select>
        </div>
        <div class="field">
          <button type="button" class="button-secondary" data-info-button>Model info</button>
        </div>
        <div class="field">
          <span class="label">Current model info</span>
          <div class="info-panel" data-model-info>Select a model and tap Model info.</div>
        </div>
        <ul class="messages" data-message-list></ul>
        <form class="composer" data-chat-form>
          <label class="label" for="instruction">Instruction</label>
          <textarea
            id="instruction"
            name="instruction"
            class="instruction-input"
            data-instruction
            placeholder="You are a concise assistant..."
          ></textarea>
          <label class="label" for="prompt">Message</label>
          <textarea
            id="prompt"
            name="prompt"
            data-prompt
            placeholder="Ask something..."
          ></textarea>
          <div class="actions">
            <button type="button" class="button-secondary" data-clear-button>Clear</button>
            <button type="submit" data-send-button>Send</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
